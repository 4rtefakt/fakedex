name = "fakedex"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# The shared-dex D1 binding ("DB") is NOT declared here on purpose:
#  - Local dev binds it via a CLI flag (see .claude/launch.json / README).
#  - Production binds it in the Cloudflare Pages dashboard after you create the
#    database, so a git deploy never ships an invalid binding.
# Provision once:
#    wrangler d1 create fakedex-db
#    wrangler d1 execute fakedex-db --remote --file schema.sql
# then add a D1 binding named DB -> fakedex-db in Pages > Settings > Functions.
